{% extends "base.html" %}
{% block title %}Access research{% endblock %}

{% block content %}
<article class="card auth-card">
  <div class="card-edge"></div>
  <div class="card-layout">
    <div class="card-number">🔒</div>
    <div class="card-content auth-content">
      <h2>{{ research_name }}</h2>
      <p>Введите пароль для перехода к исследованию.</p>

      {% if error %}
      <p class="auth-error">{{ error }}</p>
      {% endif %}

      <form class="auth-form" method="post" action="/go/{{ research_path }}">
        <label for="password" class="auth-label">Пароль</label>
        <input id="password" type="password" name="password" placeholder="Введите пароль" autocomplete="current-password" required />
        <button type="submit">Перейти</button>
      </form>
    </div>
  </div>
</article>
{% endblock %}
