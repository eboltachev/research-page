{% extends "base.html" %}
{% block title %}Access research{% endblock %}

{% block content %}
<article class="card">
  <h2>{{ research_name }}</h2>
  <p>Введите пароль для перехода к исследованию.</p>
  {% if error %}
  <p style="color:#ff9ea2;">{{ error }}</p>
  {% endif %}
  <form method="post" action="/go/{{ research_path }}">
    <input type="password" name="password" placeholder="Пароль" required />
    <button type="submit">Перейти</button>
  </form>
</article>
{% endblock %}
