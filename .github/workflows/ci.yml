name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv pip install -r uv.lock
      - name: Ruff
        run: uv run ruff check .
      - name: Pytest
        run: uv run pytest -q

  redis-integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv pip install -r uv.lock
      - name: Redis backend integration tests
        env:
          RATE_LIMIT_BACKEND: redis
          RATE_LIMIT_REDIS_URL: redis://127.0.0.1:6379/0
        run: uv run pytest -q tests/test_redis_backend.py

  redis-cluster-integration:
    runs-on: ubuntu-latest
    services:
      redis-cluster:
        image: grokzen/redis-cluster:7.2.0
        ports:
          - 7000:7000
          - 7001:7001
          - 7002:7002
          - 7003:7003
          - 7004:7004
          - 7005:7005
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv pip install -r uv.lock
      - name: Redis cluster integration tests
        env:
          RATE_LIMIT_BACKEND: redis-cluster
          RATE_LIMIT_REDIS_CLUSTER_NODES: 127.0.0.1:7000
        run: uv run pytest -q tests/test_redis_cluster_backend.py

  policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install conftest
        run: |
          wget -qO- https://raw.githubusercontent.com/open-policy-agent/conftest/master/install.sh | sh -s -- -b /usr/local/bin
      - name: Validate Dockerfile policy
        run: conftest test --parser dockerfile --policy policy Dockerfile
      - name: Validate compose policy
        run: conftest test --policy policy docker-compose.yml

  smoke-docker:
    runs-on: ubuntu-latest
    needs: [test, redis-integration, redis-cluster-integration, policy-check]
    steps:
      - uses: actions/checkout@v4
      - name: Docker smoke test
        run: ./scripts/smoke_container.sh
